name: Pull Request

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkstyle
        uses: eviive/actions/validate/lint/checkstyle@main
        with:
          token: ${{ secrets.REVIEWDOG_GITHUB_API_TOKEN }}
          checkstyle_config: config/checkstyle/config.xml
          checkstyle_version: 10.17.0
